<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="pagination-nav(page, url)"
     th:if="${page.totalPages > 1}"
     aria-label="Page navigation">
    <ul class="pagination justify-content-center">
        <li class="page-item" th:classappend="${page.first ? 'disabled' : ''}">
            <a class="page-link" th:href="@{${url}(page=${page.number - 1}, size=${page.size})}">Anterior</a>
        </li>

        <li class="page-item disabled">
            <span class="page-link" th:text="'Página ' + (${page.number + 1}) + ' de ' + ${page.totalPages}"></span>
        </li>

        <li class="page-item" th:classappend="${page.last ? 'disabled' : ''}">
            <a class="page-link" th:href="@{${url}(page=${page.number + 1}, size=${page.size})}">Próximo</a>
        </li>
    </ul>
</nav>

</body>
</html>
