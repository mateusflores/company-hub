<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: template(pageTitle='Consulta de Empresas', pageContent=~{::content}, activePage='empresas')}">

<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mt-4">Consulta de Empresas</h1>
        <a th:href="@{/web/companies/new}" class="btn btn-success">
            <i class="bi bi-plus-lg"></i> Cadastrar Empresa
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>CNPJ</th>
                <th>Razão Social</th>
                <th>Nome Fantasia</th>
                <th style="width: 10%;">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="company : ${companyPage.content}">
                <td th:text="${company.cnpj()}"></td>
                <td th:text="${company.companyName()}"></td>
                <td th:text="${company.tradingName()}"></td>
                <td>
                    <a class="btn btn-primary btn-sm" href="#"> <i class="bi bi-pencil"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav th:replace="~{fragments/pagination :: pagination-nav(page=${companyPage}, url='/web/companies')}"></nav>

</div>
</html>
