<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:fragment="template(pageTitle, pageContent, activePage)"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - CompanyHub'">CompanyHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">

    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body>

<div class="d-flex" id="wrapper">

    <div class="d-flex flex-column flex-shrink-0 p-3 text-dark bg-light" id="sidebar-wrapper">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-dark text-decoration-none">
            <span class="fs-4">CompanyHub</span>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a th:href="@{/web/home}" class="nav-link" th:classappend="${activePage == 'home' ? 'active' : 'text-dark'}">
                    <i class="bi bi-house-door me-2"></i>Home
                </a>
            </li>

            <li>
                <a href="#submenu-cadastro" data-bs-toggle="collapse" class="nav-link text-dark">
                    <i class="bi bi-pencil-square me-2"></i>
                    Cadastros
                    <i class="bi bi-caret-down-fill ms-2"></i>
                </a>
                <div class="collapse" id="submenu-cadastro">
                    <ul class="btn-toggle-nav list-unstyled fw-normal pb-1 small">
                        <li><a th:href="@{/web/client-accounts}" class="nav-link text-dark ms-4">Clientes</a></li>
                        <li><a th:href="@{/web/companies}" class="nav-link text-dark ms-4">Empresas</a></li>
                        <li><a th:href="@{/web/products}" class="nav-link text-dark ms-4">Produtos</a></li>
                        <li><a href="#" class="nav-link text-dark ms-4">Usuários</a></li>
                    </ul>
                </div>
            </li>

            <li>
                <a href="#" class="nav-link text-dark">
                    <i class="bi bi-receipt-cutoff me-2"></i>Gerenciar Assinaturas
                </a>
            </li>
            <li>
                <a href="#" class="nav-link text-dark">
                    <i class="bi bi-graph-up me-2"></i>Relatórios
                </a>
            </li>
        </ul>
        <hr>
        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-dark text-decoration-none dropdown-toggle" id="dropdownUser" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle fs-4 me-2"></i>
                <strong>Usuário Logado</strong>
            </a>
            <ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownUser">
                <li><a class="dropdown-item" href="#">Editar Perfil</a></li>
                <li><a class="dropdown-item" href="#">Trocar Usuário</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#">Sair (Deslogar)</a></li>
            </ul>
        </div>
    </div>

    <main class="w-100">
        <nav class="navbar navbar-light bg-light border-bottom px-3">
            <span class="navbar-brand mb-0 h1" th:text="${pageTitle}">Título da Página</span>
        </nav>

        <div class="container-fluid p-4">
            <div th:replace="${pageContent}">
                <p>O conteúdo da página vai aqui.</p>
            </div>
        </div>
    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
</body>
</html>
