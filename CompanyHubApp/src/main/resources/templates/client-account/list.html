<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: template(pageTitle='Consulta de Clientes', pageContent=~{::content}, activePage='clientes')}">

<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mt-4">Consulta de Clientes</h1>
        <a th:href="@{/web/client-accounts/new}" class="btn btn-success">
            <i class="bi bi-plus-lg"></i> Novo Cliente
        </a>
    </div>

    <div id="client-account-table-container">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Identificador</th>
                <th style="width: 10%;">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="acc : ${clientAccountPage.content}">
                <td th:text="${acc.id()}"></td>
                <td th:text="${acc.userName()}"></td>
                <td th:text="${acc.identifier()}"></td>
                <td>
                    <a class="btn btn-primary btn-sm"
                       th:href="@{/web/client-accounts/{id}/edit(id=${acc.id()})}">
                        <i class="bi bi-pencil"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</html>
